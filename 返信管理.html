<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>返信TODOアプリ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
    background: #f5f4f0;
    color: #2c2c2a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 1.5rem;
    color: #2c2c2a;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    border: 0.5px solid #d3d1c7;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .label {
    font-size: 12px;
    color: #888780;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .tag-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag-btn {
    padding: 6px 16px;
    border-radius: 99px;
    border: 0.5px solid #d3d1c7;
    background: #fff;
    color: #2c2c2a;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .tag-btn:hover { background: #f5f4f0; }
  .tag-btn.selected { background: #e6f1fb; color: #185fa5; border-color: #85b7eb; }
  .friend-btn {
    padding: 7px 14px;
    border-radius: 8px;
    border: 0.5px solid #d3d1c7;
    background: #fff;
    color: #2c2c2a;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    display: flex; align-items: center; gap: 6px;
  }
  .friend-btn:hover { background: #f5f4f0; }
  .friend-btn.selected { background: #e6f1fb; color: #185fa5; border-color: #85b7eb; }
  .del-x {
    font-size: 10px;
    color: #888780;
    margin-left: 2px;
    padding: 1px 3px;
    border-radius: 3px;
  }
  .del-x:hover { background: #f7c1c1; color: #a32d2d; }
  .input-row { display: flex; gap: 8px; }
  input[type="text"] {
    flex: 1;
    padding: 8px 12px;
    border-radius: 8px;
    border: 0.5px solid #d3d1c7;
    background: #fff;
    color: #2c2c2a;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  input[type="text"]:focus { border-color: #85b7eb; }
  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-primary { background: #e6f1fb; color: #185fa5; }
  .btn-primary:hover { background: #b5d4f4; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: #f5f4f0; color: #2c2c2a; border: 0.5px solid #d3d1c7; }
  .btn-secondary:hover { background: #d3d1c7; }
  .btn-danger { background: #fcebeb; color: #a32d2d; padding: 5px 10px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; }
  .btn-danger:hover { background: #f7c1c1; }
  .preview {
    padding: 12px 14px;
    border-radius: 8px;
    background: #f5f4f0;
    font-size: 16px;
    font-weight: 500;
    min-height: 44px;
    display: flex; align-items: center;
    color: #2c2c2a;
  }
  .preview.empty { color: #888780; font-weight: 400; font-size: 13px; }
  .status {
    font-size: 13px;
    padding: 6px 0;
    min-height: 24px;
  }
  .status.ok { color: #3b6d11; }
  .status.err { color: #a32d2d; }
  .status.loading { color: #888780; }
  .auth-card {
    background: #fff;
    border-radius: 12px;
    border: 0.5px solid #d3d1c7;
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #e24b4a; flex-shrink: 0; }
  .dot.ok { background: #639922; }
  .auth-info { flex: 1; }
  .auth-name { font-size: 14px; font-weight: 500; }
  .auth-sub { font-size: 12px; color: #888780; margin-top: 2px; }
  .todo-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-radius: 8px;
    border: 0.5px solid #d3d1c7;
    background: #fff;
    margin-bottom: 6px;
  }
  .todo-title { font-size: 14px; color: #2c2c2a; font-weight: 500; }
  .todo-meta { font-size: 11px; color: #888780; margin-top: 2px; }
  .badge {
    font-size: 11px; padding: 3px 8px; border-radius: 99px;
    background: #e6f1fb; color: #185fa5;
    margin-right: 6px;
  }
  .empty-state { font-size: 13px; color: #888780; padding: 8px 0; }
  .divider { border: none; border-top: 0.5px solid #d3d1c7; margin: 1rem 0; }
  .section-title { font-size: 13px; color: #888780; margin-bottom: 10px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #f1efe8; }
    .card, .auth-card, .todo-item { background: #2c2c2a; border-color: #444441; }
    input[type="text"] { background: #2c2c2a; color: #f1efe8; border-color: #444441; }
    .tag-btn, .friend-btn { background: #2c2c2a; color: #f1efe8; border-color: #444441; }
    .tag-btn:hover, .friend-btn:hover { background: #3c3c3a; }
    .btn-secondary { background: #3c3c3a; color: #f1efe8; border-color: #444441; }
    .preview { background: #3c3c3a; color: #f1efe8; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>📮 返信TODOアプリ</h1>

  <div class="auth-card">
    <span class="dot" id="auth-dot"></span>
    <div class="auth-info">
      <div class="auth-name" id="auth-label">Google未接続</div>
      <div class="auth-sub" id="auth-sub">ログインするとGoogle ToDoに自動追加されます</div>
    </div>
    <button class="btn btn-secondary" id="auth-btn" onclick="handleAuth()">Googleでログイン</button>
  </div>

  <div class="card">
    <div class="label">プラットフォーム</div>
    <div class="tag-row" id="platform-row">
      <button class="tag-btn" onclick="selectPlatform('Discord')">Discord</button>
      <button class="tag-btn" onclick="selectPlatform('X DM')">X DM</button>
      <button class="tag-btn" onclick="selectPlatform('PBW')">PBW</button>
    </div>
  </div>

  <div class="card">
    <div class="label">友達を追加</div>
    <div class="input-row">
      <input type="text" id="friend-input" placeholder="名前を入力..." onkeydown="if(event.key==='Enter')addFriend()" />
      <button class="btn btn-secondary" onclick="addFriend()">追加</button>
    </div>
  </div>

  <div class="card" id="friend-section" style="display:none;">
    <div class="label">友達を選択</div>
    <div class="tag-row" id="friend-row"></div>
  </div>

  <div class="card">
    <div class="label">プレビュー</div>
    <div class="preview empty" id="preview">プラットフォームと友達を選んでください</div>
  </div>

  <button class="btn btn-primary" id="add-btn" onclick="addToTodo()" disabled style="width:100%; padding:12px; font-size:15px; margin-bottom:6px;">TODOに追加</button>
  <div class="status" id="status"></div>

  <hr class="divider">

  <div class="section-title">返信待ちリスト</div>
  <div id="todo-list">
    <div class="empty-state">TODOを追加するとここに表示されます</div>
  </div>
</div>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<script>
const CLIENT_ID = '288819062533-862eqagih7uq246j1regadeehc9ipl43.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/tasks';
const LIST_TITLE = '返信待ち';

let tokenClient = null;
let isAuthed = false;
let selectedPlatform = '';
let selectedFriend = '';
let friends = JSON.parse(localStorage.getItem('reply_friends') || '[]');
let replyListId = localStorage.getItem('reply_list_id') || '';
let localTodos = JSON.parse(localStorage.getItem('reply_todos') || '[]');

function selectPlatform(p) {
  selectedPlatform = p;
  document.querySelectorAll('#platform-row .tag-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent.trim() === p);
  });
  updatePreview();
}

function addFriend() {
  const inp = document.getElementById('friend-input');
  const name = inp.value.trim();
  if (!name || friends.includes(name)) { inp.value = ''; return; }
  friends.push(name);
  localStorage.setItem('reply_friends', JSON.stringify(friends));
  inp.value = '';
  renderFriends();
}

function removeFriend(name) {
  friends = friends.filter(f => f !== name);
  if (selectedFriend === name) { selectedFriend = ''; updatePreview(); }
  localStorage.setItem('reply_friends', JSON.stringify(friends));
  renderFriends();
}

function renderFriends() {
  const row = document.getElementById('friend-row');
  const sec = document.getElementById('friend-section');
  sec.style.display = friends.length ? '' : 'none';
  row.innerHTML = friends.map(f => `
    <button class="friend-btn${selectedFriend === f ? ' selected' : ''}" onclick="selectFriend('${f}')">
      ${f}<span class="del-x" onclick="event.stopPropagation();removeFriend('${f}')">✕</span>
    </button>
  `).join('');
}

function selectFriend(f) {
  selectedFriend = f;
  renderFriends();
  updatePreview();
}

function updatePreview() {
  const p = document.getElementById('preview');
  const btn = document.getElementById('add-btn');
  if (selectedPlatform && selectedFriend) {
    p.textContent = `${selectedPlatform}/${selectedFriend}`;
    p.className = 'preview';
    btn.disabled = false;
  } else {
    p.textContent = 'プラットフォームと友達を選んでください';
    p.className = 'preview empty';
    btn.disabled = true;
  }
}

function setStatus(msg, type) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status ' + (type || '');
}

async function addToTodo() {
  const title = `${selectedPlatform}/${selectedFriend}`;
  if (!selectedPlatform || !selectedFriend) return;
  if (isAuthed) {
    await addToGoogleTasks(title);
  } else {
    addLocalTodo(title);
  }
  selectedFriend = '';
  renderFriends();
  updatePreview();
}

function addLocalTodo(title) {
  const item = { id: Date.now(), title, added: new Date().toLocaleDateString('ja-JP') };
  localTodos.unshift(item);
  localStorage.setItem('reply_todos', JSON.stringify(localTodos));
  renderLocalTodos();
  setStatus('追加しました（ローカル保存）', 'ok');
}

function renderLocalTodos() {
  const list = document.getElementById('todo-list');
  if (!localTodos.length) {
    list.innerHTML = '<div class="empty-state">TODOを追加するとここに表示されます</div>';
    return;
  }
  list.innerHTML = localTodos.map(t => `
    <div class="todo-item">
      <div>
        <div class="todo-title">${t.title}</div>
        <div class="todo-meta">${t.added}</div>
      </div>
      <div>
        <span class="badge">返信待ち</span>
        <button class="btn-danger" onclick="removeTodo(${t.id})">完了</button>
      </div>
    </div>
  `).join('');
}

function removeTodo(id) {
  localTodos = localTodos.filter(t => t.id !== id);
  localStorage.setItem('reply_todos', JSON.stringify(localTodos));
  renderLocalTodos();
}

function handleAuth() {
  if (!tokenClient) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: async (resp) => {
        if (resp.error) { setStatus('ログイン失敗: ' + resp.error, 'err'); return; }
        isAuthed = true;
        updateAuthUI(true);
        await ensureList();
        await loadTasks();
      }
    });
  }
  tokenClient.requestAccessToken();
}

function updateAuthUI(ok) {
  document.getElementById('auth-dot').className = 'dot' + (ok ? ' ok' : '');
  document.getElementById('auth-label').textContent = ok ? 'Google接続済み' : 'Google未接続';
  document.getElementById('auth-btn').textContent = ok ? '再接続' : 'Googleでログイン';
  document.getElementById('auth-sub').textContent = ok ? 'Google ToDoに自動追加されます' : 'ログインするとGoogle ToDoに自動追加できます';
}

async function ensureList() {
  try {
    const res = await gapi.client.tasks.tasklists.list();
    const lists = res.result.items || [];
    const existing = lists.find(l => l.title === LIST_TITLE);
    if (existing) {
      replyListId = existing.id;
    } else {
      const created = await gapi.client.tasks.tasklists.insert({ resource: { title: LIST_TITLE } });
      replyListId = created.result.id;
    }
    localStorage.setItem('reply_list_id', replyListId);
  } catch(e) { setStatus('リスト取得エラー', 'err'); }
}

async function addToGoogleTasks(title) {
  setStatus('追加中...', 'loading');
  try {
    await gapi.client.tasks.tasks.insert({
      tasklist: replyListId,
      resource: { title }
    });
    setStatus('Google ToDoに追加しました！', 'ok');
    await loadTasks();
  } catch(e) {
    setStatus('エラー: ' + (e.result?.error?.message || e), 'err');
  }
}

async function loadTasks() {
  try {
    const res = await gapi.client.tasks.tasks.list({ tasklist: replyListId, showCompleted: false });
    const tasks = (res.result.items || []).filter(t => t.status !== 'completed');
    const list = document.getElementById('todo-list');
    if (!tasks.length) {
      list.innerHTML = '<div class="empty-state">返信待ちはありません</div>';
      return;
    }
    list.innerHTML = tasks.map(t => `
      <div class="todo-item">
        <div>
          <div class="todo-title">${t.title}</div>
        </div>
        <div>
          <span class="badge">返信待ち</span>
          <button class="btn-danger" onclick="completeTask('${t.id}')">完了</button>
        </div>
      </div>
    `).join('');
  } catch(e) {}
}

async function completeTask(id) {
  try {
    await gapi.client.tasks.tasks.patch({
      tasklist: replyListId,
      task: id,
      resource: { status: 'completed' }
    });
    setStatus('完了にしました！', 'ok');
    await loadTasks();
  } catch(e) { setStatus('エラー', 'err'); }
}

gapi.load('client', async () => {
  await gapi.client.init({});
  await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/tasks/v1/rest');
});

renderFriends();
renderLocalTodos();
</script>
</body>
</html>
