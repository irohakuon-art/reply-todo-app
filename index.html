<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>返信管理アプリ</title>
<script src="https://apis.google.com/js/api.js"></script>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #7c6af7;
    --accent2: #b06af7;
    --text: #e8e8f0;
    --text2: #8888aa;
    --green: #4ade80;
    --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 16px;
    font-size: 16px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h1::before { content: '✉'; font-size: 16px; }

  /* ログインエリア */
  #login-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    margin-bottom: 16px;
  }
  #login-area p { color: var(--text2); font-size: 16px; margin-bottom: 12px; }

  /* ボタン共通 */
  .btn {
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-family: inherit;
    padding: 8px 14px;
    transition: all 0.15s;
    font-weight: 500;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

  /* セクション */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text2);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ワンタップボタングループ */
  .quick-group { margin-bottom: 12px; }
  .quick-label {
    font-size: 17px;
    color: var(--text2);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .quick-label span { font-size: 16px; }
  .quick-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .quick-btn {
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface2);
    color: var(--text);
    font-size: 15px;
    padding: 8px 16px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,106,247,0.1);
  }
  .quick-btn.pbw {
    border-color: rgba(176,106,247,0.4);
    color: #c49af7;
  }
  .quick-btn.pbw:hover {
    border-color: var(--accent2);
    background: rgba(176,106,247,0.1);
  }

  /* プレビュー */
  #preview-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin: 12px 0;
    font-size: 16px;
    color: var(--text2);
    min-height: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #preview-box.ready { color: var(--text); border-color: var(--accent); }
  #preview-title { flex: 1; }
  #preview-detail { font-size: 17px; color: var(--text2); margin-top: 2px; }

  /* 詳細入力 */
  .detail-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .detail-row label { font-size: 15px; color: var(--text2); min-width: 40px; }
  .detail-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 15px;
    padding: 6px 10px;
    font-family: inherit;
  }
  .detail-row input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .detail-row input::placeholder { color: var(--text2); }

  /* 追加ボタン */
  #add-btn {
    width: 100%;
    padding: 10px;
    font-size: 17px;
    border-radius: 8px;
    margin-top: 4px;
  }

  /* リスト */
  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .todo-item:last-child { border-bottom: none; }
  .todo-check {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .todo-check:hover { border-color: var(--green); background: rgba(74,222,128,0.1); }
  .todo-body { flex: 1; }
  .todo-title { font-size: 16px; line-height: 1.4; }
  .todo-detail { font-size: 17px; color: var(--text2); margin-top: 2px; word-break: break-all; }
  .todo-del {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 17px;
    padding: 0 4px;
    line-height: 1;
  }
  .todo-del:hover { color: var(--red); }

  .empty { color: var(--text2); font-size: 16px; text-align: center; padding: 16px 0; }

  /* ステータス */
  #status {
    font-size: 17px;
    color: var(--text2);
    text-align: center;
    padding: 4px 0;
    min-height: 20px;
  }
  #status.ok { color: var(--green); }
  #status.err { color: var(--red); }
</style>
</head>
<body>

<h1>返信管理</h1>

<!-- ログインエリア -->
<div id="login-area">
  <p>Google Tasksと連携するにはログインしてください</p>
  <button class="btn btn-primary" onclick="handleAuth()">Googleでログイン</button>
</div>

<!-- メインUI（ログイン後表示） -->
<div id="main-ui" style="display:none">

  <!-- ワンタップ追加 -->
  <div class="section">
    <div class="section-title">ワンタップ追加</div>

    <div class="quick-group">
      <div class="quick-label"><span>💬</span> Discord</div>
      <div class="quick-buttons">
        <button class="quick-btn" onclick="quickAdd('Discord','桃桜')">桃桜</button>
        <button class="quick-btn" onclick="quickAdd('Discord','ぺぃっさん')">ぺぃっさん</button>
        <button class="quick-btn" onclick="quickAdd('Discord','いすゞ')">いすゞ</button>
        <button class="quick-btn" onclick="quickAdd('Discord','からあげ')">からあげ</button>
        <button class="quick-btn" onclick="quickAdd('Discord','源さん')">源さん</button>
      </div>
    </div>

    <div class="quick-group">
      <div class="quick-label"><span>🐦</span> X DM</div>
      <div class="quick-buttons">
        <button class="quick-btn" onclick="quickAdd('X DM','みょんズ')">みょんズ</button>
        <button class="quick-btn" onclick="quickAdd('X DM','みこち')">みこち</button>
        <button class="quick-btn" onclick="quickAdd('X DM','てあるさん')">てあるさん</button>
      </div>
    </div>

    <div class="quick-group">
      <div class="quick-label"><span>🎮</span> PBW</div>
      <div class="quick-buttons">
        <button class="quick-btn pbw" onclick="quickAdd('PBW','凛櫻','https://tw7.t-walker.jp/gallery/request/complete/?as_character=g00518&order_id=1334766')">凛櫻</button>
        <button class="quick-btn pbw" onclick="quickAdd('PBW','アネモネ','https://tw6.jp/garage/item?as_character=f25656&character_id=f25656')">アネモネ</button>
        <button class="quick-btn pbw" onclick="quickAdd('PBW','ポン子','https://tw6.jp/gallery/request/complete/?as_character=f00299&order_id=1333340')">ポン子</button>
        <button class="quick-btn pbw" onclick="quickAdd('PBW','キツネ','https://tw7.t-walker.jp/scenario/show?as_character=g03639&scenario_id=12872')">キツネ</button>
        <button class="quick-btn pbw" onclick="quickAdd('PBW','日和','https://tw8.t-walker.jp/scenario/show?as_character=h00732&scenario_id=9975')">日和</button>
        <button class="quick-btn pbw" onclick="quickAdd('PBW','劉麗','https://tw8.t-walker.jp/gallery/obligation/1307796?as_character=h03508')">劉麗</button>
        <button class="quick-btn pbw" onclick="quickAdd('PBW','Noah','https://rev2.reversion.jp/character/detail/r2p001449')">Noah</button>
        <button class="quick-btn pbw" onclick="quickAdd('PBW','レティシア','https://rev2.reversion.jp/character/detail/r2p005010')">レティシア</button>
      </div>
    </div>

    <!-- プレビュー & 詳細入力 -->
    <div id="preview-box">
      <span id="preview-title">ボタンを押すとここにプレビューされます</span>
    </div>

    <div id="detail-area" style="display:none">
      <div class="detail-row">
        <label>詳細</label>
        <input type="text" id="detail-input" placeholder="URLや補足メモなど（任意）">
      </div>
      <button class="btn btn-primary" id="add-btn" onclick="addToTasks()">TODOに追加する</button>
    </div>

    <div id="status"></div>
  </div>

  <!-- 返信待ちリスト -->
  <div class="section">
    <div class="section-title">返信待ちリスト</div>
    <div id="todo-list"><div class="empty">読み込み中...</div></div>
  </div>

</div>

<script>
// ===== Google API設定 =====
const CLIENT_ID = '288819062533-862eqagih7uq246j1regadeehc9ipl43.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/tasks';
const LIST_NAME = '返信待ち';

let tokenClient;
let listId = null;
let pending = null; // {platform, name, url}

// ===== 認証 =====
function handleAuth() {
  gapi.load('client', async () => {
    await gapi.client.init({
      discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/tasks/v1/rest']
    });
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: async (res) => {
        if (res.error) return;
        document.getElementById('login-area').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        listId = await getOrCreateList();
        loadTasks();
      }
    });
    tokenClient.requestAccessToken();
  });
}

async function getOrCreateList() {
  const res = await gapi.client.tasks.tasklists.list();
  const lists = res.result.items || [];
  const found = lists.find(l => l.title === LIST_NAME);
  if (found) return found.id;
  const created = await gapi.client.tasks.tasklists.insert({ resource: { title: LIST_NAME } });
  return created.result.id;
}

// ===== ワンタップ追加 =====
function quickAdd(platform, name, url = '') {
  pending = { platform, name, url };
  const title = `${platform} / ${name}にレス`;

  const previewEl = document.getElementById('preview-box');
  const previewTitle = document.getElementById('preview-title');
  previewEl.className = 'ready';
  previewTitle.innerHTML = `<div id="preview-title">${title}</div>${url ? `<div id="preview-detail" style="font-size:11px;color:var(--text2);margin-top:2px">${url}</div>` : ''}`;

  document.getElementById('detail-input').value = url;
  document.getElementById('detail-area').style.display = 'block';
  setStatus('');
}

// ===== Tasks追加 =====
async function addToTasks() {
  if (!pending) return;
  if (!listId) { setStatus('ログインしてください', 'err'); return; }

  const title = `${pending.platform} / ${pending.name}にレス`;
  const detail = document.getElementById('detail-input').value.trim();

  setStatus('追加中...');
  try {
    const resource = { title, notes: detail || '' };
    await gapi.client.tasks.tasks.insert({ tasklist: listId, resource });
    setStatus('✓ 追加しました', 'ok');
    pending = null;
    document.getElementById('preview-box').className = '';
    document.getElementById('preview-box').innerHTML = '<span id="preview-title">ボタンを押すとここにプレビューされます</span>';
    document.getElementById('detail-area').style.display = 'none';
    loadTasks();
  } catch(e) {
    setStatus('エラーが発生しました', 'err');
  }
}

// ===== タスク読み込み =====
async function loadTasks() {
  if (!listId) return;
  try {
    const res = await gapi.client.tasks.tasks.list({ tasklist: listId, showCompleted: false });
    const tasks = res.result.items || [];
    const el = document.getElementById('todo-list');
    if (!tasks.length) {
      el.innerHTML = '<div class="empty">返信待ちはありません</div>';
      return;
    }
    el.innerHTML = tasks.map(t => `
      <div class="todo-item" id="task-${t.id}">
        <div class="todo-check" onclick="completeTask('${t.id}')"></div>
        <div class="todo-body">
          <div class="todo-title">${t.title}</div>
          ${t.notes ? `<div class="todo-detail">${t.notes}</div>` : ''}
        </div>
        <button class="todo-del" onclick="deleteTask('${t.id}')">✕</button>
      </div>
    `).join('');
  } catch(e) { console.log(e); }
}

async function completeTask(id) {
  try {
    await gapi.client.tasks.tasks.patch({ tasklist: listId, task: id, resource: { status: 'completed' } });
    document.getElementById('task-' + id)?.remove();
    if (!document.querySelector('.todo-item')) {
      document.getElementById('todo-list').innerHTML = '<div class="empty">返信待ちはありません</div>';
    }
  } catch(e) { console.log(e); }
}

async function deleteTask(id) {
  try {
    await gapi.client.tasks.tasks.delete({ tasklist: listId, task: id });
    document.getElementById('task-' + id)?.remove();
    if (!document.querySelector('.todo-item')) {
      document.getElementById('todo-list').innerHTML = '<div class="empty">返信待ちはありません</div>';
    }
  } catch(e) { console.log(e); }
}

function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
}
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
